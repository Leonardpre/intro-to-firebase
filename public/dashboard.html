<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Inputs Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --text-primary: #FFFFFF;
            --glass-bg: rgba(102, 207, 197, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --accent-turquoise: #20B2AA;
            --accent-hover: #1c9c95;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Placeholder background gradient in case image isn't local */
            background: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.4)),
                url('istockphoto-478351742-612x612.jpg') no-repeat center center;
            background-size: cover;
            background-attachment: fixed;
            padding: 20px;
        }

        /* Input Container Panel */
        .input-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        .panel-title {
            color: var(--text-primary);
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        /* Layout Grid for inputs and button */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        /* Form elements styling */
        .dash-input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .dash-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .dash-input:focus {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .dash-btn {
            width: 100%;
            padding: 12px 24px;
            border-radius: 30px;
            border: none;
            background-color: var(--accent-turquoise);
            color: #FFFFFF;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .dash-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .dash-btn:active {
            transform: translateY(0);
        }

        /* Premium Responsive Layout Shift */
        @media (min-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr 1fr;
                /* Puts inputs side-by-side */
            }

            .dash-btn {
                grid-column: span 2;
                /* Forces the button to stretch across both columns underneath */
            }
        }
    </style>
</head>

<body>

    <div class="input-panel">
        <h3 class="panel-title">Welcome onboard</h3>
        <div class="form-grid">
            <input type="text" class="dash-input" placeholder="Enter value...">
            <input type="text" class="dash-input" placeholder="Enter value Code (e.g., NG)...">
            <button class="dash-btn">Update Dashboard</button>
            <button onclick="logOut" class="dash-btn">log out</button>
            <div id="show"></div>
        </div>
    </div>

</body>

</html>
